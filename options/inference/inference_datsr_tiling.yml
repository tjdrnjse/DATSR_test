##############################################################
# DATSR Standalone Inference — In-the-wild / No GT required
#
# 사용법:
#   python inference.py -opt options/inference/inference_datsr_tiling.yml
#
# 입력 데이터 구성 (이름 매칭 규칙):
#   dataroot_lr/  0001.png  0002.png  ...
#   dataroot_ref/ 0001.png  0002.png  ...   ← 파일 이름이 동일해야 매칭
#
# GT(정답) 이미지 불필요. 벤치마크 평가용 test.py 와 완전히 분리.
##############################################################

# ── 입출력 경로 ──────────────────────────────────────────────
dataroot_lr:  data/inference/LR       # LR 이미지 폴더
dataroot_ref: data/inference/Ref      # Ref 이미지 폴더 (LR 과 파일명 동일해야 매칭)
output_dir:   results/inference/SR    # SR 결과 저장 폴더

# ── 모델 경로 ────────────────────────────────────────────────
pretrain_model_g:                experiments/pretrained_model/restoration_mse.pth
pretrain_model_extractor:        experiments/pretrained_model.pth
scale: 4

# ── 네트워크 구조 ────────────────────────────────────────────
network_g:
  type: SwinUnetv3RestorationNet
  ngf: 128
  n_blocks: 8
  groups: 8
  embed_dim: 128
  depths: [4, 4]
  num_heads: [4, 4]
  window_size: 8
  use_checkpoint: false
  use_margin_crop: true     # margin tiling 시 ref 피처 center-crop 활성화

network_map:
  type: FlowSimCorrespondenceGenerationArch
  patch_size: 3
  stride: 1
  vgg_layer_list: ['relu1_1', 'relu2_1', 'relu3_1']
  vgg_type: 'vgg19'

network_extractor:
  type: ContrasExtractorSep

# ── 타일링 설정 ──────────────────────────────────────────────
tiling:
  lr_tile_size: 64          # LR 타일 한 변 크기. 낮출수록 VRAM 절약 (권장: 64~128)
  lr_overlap_pixels: 16     # 타일 간 겹침 픽셀. Stride = lr_tile_size - lr_overlap_pixels
  ref_search_margin: 64     # Base Ref 타일에서 상하좌우 확장 마진 (픽셀)
  padding_mode: "reflect"   # 경계 패딩: "reflect" | "replicate" | "constant"
  blending_method: "gaussian"  # 블렌딩: "gaussian" | "linear"
  gaussian_sigma: 0.5       # Gaussian 윈도우 sigma 비율
  batch_size: 4             # GPU 배치 크기. VRAM 여유에 따라 조정 (권장: 4~16)

# ── 실행 설정 ────────────────────────────────────────────────
gpu_ids: [0]     # CPU 전용: []
fp16: false      # half-precision inference (GPU 전용)
